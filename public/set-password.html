<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Set Password | Tradesites AI Sales Trainer</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <section class="auth-gate" aria-labelledby="setPasswordTitle">
      <div class="auth-card">
        <h1 id="setPasswordTitle">Set your password</h1>
        <p id="setPasswordStatus">Create a password for your approved trainer account.</p>
        <form class="auth-panel" id="setPasswordForm">
          <input id="password" type="password" autocomplete="new-password" placeholder="Password" />
          <button id="setPasswordBtn" type="submit">Set Password</button>
          <a class="secondary-link" href="/app">Back to login</a>
        </form>
      </div>
    </section>

    <script>
      const form = document.querySelector("#setPasswordForm");
      const status = document.querySelector("#setPasswordStatus");
      const password = document.querySelector("#password");
      const button = document.querySelector("#setPasswordBtn");
      const params = new URLSearchParams(window.location.search);
      const id = params.get("id");
      const token = params.get("token");

      function setStatus(message, isError = false) {
        status.textContent = message;
        status.classList.toggle("error", isError);
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        if (!id || !token) {
          setStatus("Password setup link is missing details.", true);
          return;
        }
        if (!password.value || password.value.length < 8) {
          setStatus("Password must be at least 8 characters.", true);
          return;
        }
        button.disabled = true;
        try {
          const response = await fetch(`/api/signup-requests/${id}/set-password`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token, password: password.value }),
          });
          const payload = await response.json().catch(() => ({}));
          if (!response.ok) throw new Error(payload.error || "Could not set password.");
          sessionStorage.setItem("tradesitesAiSalesTrainerToken", payload.token);
          window.location.href = "/app";
        } catch (error) {
          setStatus(error.message, true);
          button.disabled = false;
        }
      });
    </script>
  </body>
</html>
